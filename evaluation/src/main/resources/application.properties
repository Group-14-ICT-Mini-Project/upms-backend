# Evaluation Service Configuration
spring.application.name=evaluation-service
server.port=8084

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/upms_evaluation
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baselineOnMigrate=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration
app.jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2024

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.root=INFO
logging.level.com.v1.evaluation=DEBUG